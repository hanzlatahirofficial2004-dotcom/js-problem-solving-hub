//Reverse a string without using reverse()
console.log("Daily Challenge # 01")
function Reverse_String(text)
{
  var new_String ="";
  for(let i=text.length-1; i>=0; i--)
  { 
    new_String = new_String + text[i];

  }
  console.log(new_String);
}

Reverse_String('Hanzla');
